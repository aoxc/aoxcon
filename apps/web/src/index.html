<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AoxCon Center</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; }
      textarea { width: 100%; height: 120px; }
      button { margin-top: 0.75rem; padding: 0.5rem 0.75rem; }
      pre { background:#f5f5f5; padding:1rem; border-radius:8px; }
    </style>
  </head>
  <body>
    <h1>AoxCon Merkezi Arayüz</h1>
    <p>Bu arayüz, backend üzerindeki <code>/dispatch</code> endpoint’ine mesaj yollar.</p>
    <label>Payload JSON</label>
    <textarea id="payload">{
  "target": "evm",
  "action": "wallet.balance",
  "payload": {
    "address": "0x123"
  }
}</textarea>
    <br />
    <button id="send">Gönder</button>
    <h3>Yanıt</h3>
    <pre id="result">Henüz istek yok.</pre>

    <script>
      const backendUrl = '__BACKEND_URL__';
      const payload = document.getElementById('payload');
      const result = document.getElementById('result');
      document.getElementById('send').addEventListener('click', async () => {
        try {
          const parsed = JSON.parse(payload.value);
          const res = await fetch(`${backendUrl}/dispatch`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(parsed)
          });
          const data = await res.json();
          result.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          result.textContent = `Hata: ${error.message}`;
        }
      });
    </script>
  </body>
</html>
