<div class="p-8 max-w-7xl mx-auto space-y-8">
  @switch (app.activeTab()) {
    @case ('overview') {
      <ng-container *ngTemplateOutlet="overviewView" />
    }
    @case ('networks') {
      <ng-container *ngTemplateOutlet="networkHeader" />
    }
  }
</div>

<ng-template #overviewView>
  <div class="space-y-8 animate-in fade-in duration-500">
    <div #chartContainer class="glass-panel p-8 h-[250px] border-white/5"></div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      @for (net of networkService.networks(); track net.id) {
        <app-network-card [data]="net" />
      }
    </div>
  </div>
</ng-template>

<ng-template #networkHeader />
