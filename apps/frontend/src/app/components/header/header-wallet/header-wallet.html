@if (!walletService.wallet().connected) {
  <button (click)="toggleWalletModal()" class="px-6 py-3 bg-[var(--color-sui)] text-black rounded-xl font-black text-[10px] uppercase tracking-[0.2em] shadow-lg">
    {{ langService.t('connectWallet') }}
  </button>
} @else {
  <div class="flex items-center gap-3 bg-white/[0.04] border border-white/10 p-2 pr-4 rounded-2xl group cursor-pointer hover:bg-white/[0.08] transition-all">
    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-zinc-800 to-black flex items-center justify-center text-[11px] font-black border border-white/10 shadow-lg">
      {{ walletInitial() }}
    </div>
    <div class="flex flex-col">
      <div class="flex items-center gap-2">
        <span class="text-[11px] font-mono font-black tracking-tighter text-white">
          {{ walletService.wallet().visible ? (walletService.wallet().address | slice:0:12) + '...' : '••••••••••••' }}
        </span>
        <button (click)="walletService.toggleVisibility(); $event.stopPropagation()" class="text-[10px] text-[var(--color-text-muted)]">
          <i class="fa-solid" [class.fa-eye]="!walletService.wallet().visible" [class.fa-eye-slash]="walletService.wallet().visible"></i>
        </button>
      </div>
      <span class="text-[9px] text-[var(--color-sui)] font-black uppercase tracking-widest mt-0.5">
        {{ walletService.wallet().visible ? walletService.wallet().balance : 'Neural Locked' }}
      </span>
    </div>
  </div>
}
