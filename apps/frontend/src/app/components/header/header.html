<header class="h-20 border-b border-white/5 flex items-center justify-between px-8 bg-[#05070a]/80 backdrop-blur-2xl z-[100] sticky top-0">
  <div class="flex items-center gap-4 w-48 shrink-0">
    <div class="flex flex-col">
      <span class="text-[9px] font-black uppercase tracking-[0.3em] text-[var(--color-sui)] mb-1">Infrastructure</span>
      <h2 class="text-xs font-bold text-white uppercase tracking-tight italic">{{ app.activeTab() }}</h2>
    </div>
  </div>

  <div class="flex-1 flex justify-center max-w-3xl px-8">
    <div class="relative w-full group">
      <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-xs text-[var(--color-text-muted)]"></i>
      <input type="text" [placeholder]="langService.t('searchPlaceholder')" 
             class="w-full bg-white/[0.03] border border-white/5 rounded-2xl py-3 pl-12 pr-40 text-sm focus:outline-none focus:border-[var(--color-sui)]/50 transition-all">
      
      <div class="absolute inset-y-1.5 right-1.5 flex">
        <button (click)="toggleSearchDropdown()" class="px-4 bg-white/5 rounded-xl text-[9px] font-black uppercase tracking-widest flex items-center gap-2">
          {{ selectedSearchNetwork() }}
          <i class="fa-solid fa-chevron-down text-[7px]" [class.rotate-180]="showSearchDropdown()"></i>
        </button>
        @if (showSearchDropdown()) {
          <div class="absolute top-[calc(100%+10px)] right-0 w-56 bg-[#0b1329] border border-white/10 rounded-2xl shadow-2xl z-[70]">
            @for (net of networks; track net) {
              <button (click)="selectSearchNetwork(net)" class="w-full text-left px-5 py-3 text-[10px] font-bold uppercase hover:bg-[var(--color-sui)]/10">
                {{ net }}
              </button>
            }
          </div>
        }
      </div>
    </div>
  </div>

  <div class="flex items-center gap-4 w-auto shrink-0">
    <app-header-language-selector />
    <app-header-ai-selector />
    <app-header-wallet />
  </div>
</header>
